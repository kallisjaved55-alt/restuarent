<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 100px;
        background: #f4f7f9;

    }
    .box{
        width: 120px;
        height: 120px;
        border-radius: 20px;

    }
    .move{
        animation: leftright 3s infinite ease-in-out;
    }
    @keyframes leftright{
        0%{
            transform: translateY(0);
            background: red;

        }
        50%{

             transform: translateY(80px);
             background: bisque;

        }
        100%{
            transform: translateY(0);
            background: red;
        }
        
    }
    .rotate{

        animation: rotatebox 3s infinite linear;
    }
    @keyframes rotatebox{
        from{
            transform: rotate(0deg);
            background: orange;

        }

        to{
            transform: rotate(360deg);
            background: purple;

        }
    }
    .scale{
        animation: scalebox 2s infinite ease-in-out;

    }
    @keyframes scalebox{
        0%{
            transform: scale(1);
            background: pink;
        }
        50%{
            transform: scale(1.3);
            background: blue;
        }
        0%{
            transform: scale(0);
            background: darkslategray;
        }

    }
</style>
<body>
    <div class="container">
        <div class="box move"></div>
        <div class="box rotate"></div>
        <div class="box scale"></div>
    </div>
    
</body>
</html>
